<tr hx-target="this" hx-swap="outerHTML swap:1s">
    <td>
        <a href="https://huggingface.co/{{ model.repo_id }}" target="_blank">{{ model.repo_id }}</a>
    </td>
    <td>{{ model.author }}</td>
    <td><span class="badge badge-success">{{ model.format or "—" }}</span></td>
    <td>{{ model.quantization or "—" }}</td>
    <td>{{ format_bytes(model.size_bytes) }}</td>
    <td>{{ model.downloaded_at.strftime("%Y-%m-%d %H:%M") if model.downloaded_at else "—" }}</td>
    <td>
        <button hx-delete="/library/{{ model.repo_id }}" hx-confirm="Delete {{ model.repo_id }}?" class="secondary" style="padding: 0.5rem 1rem;">Delete</button>
    </td>
</tr>
