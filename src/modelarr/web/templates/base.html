<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}modelarr{% endblock %}</title>
    <link rel="stylesheet" href="/static/pico.min.css">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/htmx.min.js"></script>
    <style>
        nav a.active {
            font-weight: bold;
            color: var(--form-element-valid-border-color);
        }
    </style>
</head>
<body>
    <nav class="container-fluid">
        <ul>
            <li><strong>modelarr</strong></li>
        </ul>
        <ul>
            <li><a href="/">Dashboard</a></li>
            <li><a href="/watchlist">Watchlist</a></li>
            <li><a href="/library">Library</a></li>
            <li><a href="/downloads">Downloads</a></li>
            <li><a href="/search">Search</a></li>
            <li><a href="/compare">Compare</a></li>
            <li><a href="/settings">Settings</a></li>
        </ul>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="container-fluid" style="margin-top: 3rem; padding: 1rem 0; border-top: 1px solid var(--border-color); text-align: center; color: var(--muted-color);">
        <small>modelarr v0.2.0</small>
    </footer>
</body>
</html>
